#========================================
# General settings
#========================================
logging:
  level:
    root: INFO
openapi:
  name: ${spring.application.name}
  title: ${spring.application.name}
  version: '@project.version@'
spring:
  application:
    name: api-e-signing
  security:
    oauth2:
      client:
        provider:
          esigningprocess:
            token-uri: ${config.esigningprocess.token-url}
          document:
            token-uri: ${config.document.token-url}
          comfactfacade:
            token-uri: ${config.comfactfacade.token-url}
          postportalservice:
            token-uri: ${config.postportalservice.token-url}
        registration:
          esigningprocess:
            authorization-grant-type: client_credentials
            provider: esigningprocess
            client-id: ${config.esigningprocess.client-id}
            client-secret: ${config.esigningprocess.client-secret}
          document:
            authorization-grant-type: client_credentials
            provider: document
            client-id: ${config.document.client-id}
            client-secret: ${config.document.client-secret}
          comfactfacade:
            authorization-grant-type: client_credentials
            provider: comfactfacade
            client-id: ${config.comfactfacade.client-id}
            client-secret: ${config.comfactfacade.client-secret}
          postportalservice:
            authorization-grant-type: client_credentials
            provider: postportalservice
            client-id: ${config.postportalservice.client-id}
            client-secret: ${config.postportalservice.client-secret}
esigning:
  provider:
    # Active signing provider per organization (municipality id). Falls back to default-provider when unmapped.
    default-provider: comfact
    by-municipality-id:
      "2281": comfact
integration:
  esigningprocess:
    connect-timeout: ${config.esigningprocess.connect-timeout}
    read-timeout: ${config.esigningprocess.read-timeout}
    base-url: ${config.esigningprocess.base-url}
  document:
    connect-timeout: ${config.document.connect-timeout}
    read-timeout: ${config.document.read-timeout}
    base-url: ${config.document.base-url}
  comfactfacade:
    connect-timeout: ${config.comfactfacade.connect-timeout}
    read-timeout: ${config.comfactfacade.read-timeout}
    base-url: ${config.comfactfacade.base-url}
  postportalservice:
    connect-timeout: ${config.postportalservice.connect-timeout}
    read-timeout: ${config.postportalservice.read-timeout}
    base-url: ${config.postportalservice.base-url}