#========================================
# Test profile settings (IT tests)
#========================================
logging:
  level:
    root: INFO
spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.jdbc.autoconfigure.DataSourceAutoConfiguration
      - org.springframework.boot.hibernate.autoconfigure.HibernateJpaAutoConfiguration
      - org.springframework.boot.jdbc.autoconfigure.health.DataSourceHealthContributorAutoConfiguration
config:
  esigningprocess:
    base-url: http://localhost:${wiremock.server.port}/pw-esigning
    token-url: http://localhost:${wiremock.server.port}/token
    client-id: someClientId
    client-secret: someClientSecret
    connect-timeout: 5
    read-timeout: 30
  document:
    base-url: http://localhost:${wiremock.server.port}/document
    token-url: http://localhost:${wiremock.server.port}/token
    client-id: someClientId
    client-secret: someClientSecret
    connect-timeout: 5
    read-timeout: 30